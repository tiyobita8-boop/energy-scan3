<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>エネルギー状態スキャン</title>

<style>
body {
  font-family: sans-serif;
  text-align: center;
  background: #f5f5f5;
}

.container {
  width: 90%;
  max-width: 700px;
  margin: 20px auto;
}

.card {
  background: white;
  padding: 15px;
  margin: 10px;
  border-radius: 10px;
}

button {
  font-size: 18px;
  padding: 15px;
  margin: 10px;
  width: 80%;
  background: #4CAF50;
  color: white;
  border: none;
  border-radius: 10px;
}

.result {
  margin-top: 20px;
}
</style>
</head>

<body>

<h1>✨エネルギー状態スキャン</h1>

<div class="container">

<div class="card">
<h3>ネガティブ（最大3つ）</h3>
<label><input type="checkbox" value="だるい">だるい</label><br>
<label><input type="checkbox" value="イライラ">イライラ</label><br>
<label><input type="checkbox" value="不安">不安</label><br>
<label><input type="checkbox" value="悲しい">悲しい</label><br>
<label><input type="checkbox" value="モヤモヤ">モヤモヤ</label><br>
<label><input type="checkbox" value="無気力">無気力</label><br>
</div>

<div class="card">
<h3>ポジティブ（最大5つ）</h3>
<label><input type="checkbox" value="楽しい">楽しい</label><br>
<label><input type="checkbox" value="感謝">感謝</label><br>
<label><input type="checkbox" value="安心">安心</label><br>
<label><input type="checkbox" value="愛">愛</label><br>
<label><input type="checkbox" value="ついてる">ついてる</label><br>
<label><input type="checkbox" value="明確">明確</label><br>
</div>

<button onclick="analyze()">分析</button>

<div class="result" id="result"></div>

</div>

<script>
function analyze(){

  const checked = Array.from(document.querySelectorAll('input:checked')).map(el => el.value);

  let chakra=[], body=[], advice=[], subconscious=[];

  checked.forEach(f => {

    if(["だるい","無気力"].includes(f)){
      chakra.push("第1");
      body.push("エーテル体");
      subconscious.push("休んではいけない","頑張らないと価値がない");
    }

    if(["イライラ","悲しい"].includes(f)){
      chakra.push("第2・4");
      body.push("アストラル体");
      subconscious.push("感情を出してはいけない","相手が悪い");
    }

    if(["モヤモヤ","不安"].includes(f)){
      chakra.push("第3・6");
      body.push("メンタル体");
      subconscious.push("正解しなければならない","失敗してはいけない");
    }

    if(["無気力"].includes(f)){
      chakra.push("第7");
      body.push("コーザル体");
      subconscious.push("人生に意味がない","どうせ変わらない");
    }

  });

  chakra=[...new Set(chakra)];
  body=[...new Set(body)];
  subconscious=[...new Set(subconscious)];

  if(body.includes("エーテル体")){
    advice.push("睡眠・水・深呼吸");
  }
  if(body.includes("アストラル体")){
    advice.push("感情を書き出す・許す");
  }
  if(body.includes("メンタル体")){
    advice.push("ぼーっとする・瞑想");
  }
  if(body.includes("コーザル体")){
    advice.push("目的再設定・ハート意識");
  }

  document.getElementById("result").innerHTML = `
  <div class="card">
  <b>乱れ</b><br>
  チャクラ：${chakra.join(" / ")}<br>
  エネルギー体：${body.join(" / ")}<br><br>

  <b>修復すべき潜在意識</b><br>
  ${subconscious.slice(0,2).join("<br>")}<br><br>

  <b>ヒーリング</b><br>
  光を当てる・呼吸で流す<br><br>

  <b>行動</b><br>
  ${advice.join("<br>")}
  </div>
  `;
}
</script>

</body>
</html>
